name: Build & Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish (e.g. v1.2.3)"
        required: false
        type: string
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-15-intel
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: app
        run: pnpm install

      - name: Build Tauri app
        working-directory: app
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v6
        with:
          name: claw-sama-windows
          path: |
            app/src-tauri/target/x86_64-pc-windows-msvc/release/claw-sama.exe
            app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

      - name: Upload artifacts (macOS)
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v6
        with:
          name: claw-sama-macos-${{ matrix.target }}
          path: app/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Zip .app bundle (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          cd app/src-tauri/target/${{ matrix.target }}/release/bundle/macos
          ditto -c -k --sequesterRsrc --keepParent "Claw Sama.app" "Claw Sama-${{ matrix.target }}.zip"

      - name: Upload .app bundle (macOS)
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v6
        with:
          name: claw-sama-app-${{ matrix.target }}
          path: app/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.zip

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v7
        with:
          name: claw-sama-windows
          path: artifacts
      - uses: actions/download-artifact@v7
        with:
          name: claw-sama-macos-aarch64-apple-darwin
          path: artifacts
      - uses: actions/download-artifact@v7
        with:
          name: claw-sama-macos-x86_64-apple-darwin
          path: artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          files: artifacts/**
          generate_release_notes: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}