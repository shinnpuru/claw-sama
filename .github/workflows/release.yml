name: Build & Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-15-intel
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: app
        run: pnpm install

      - name: Build Tauri app
        working-directory: app
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v6
        with:
          name: claw-sama-windows
          path: |
            app/src-tauri/target/x86_64-pc-windows-msvc/release/claw-sama.exe

      - name: Upload .app bundle for npm (macOS)
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v6
        with:
          name: claw-sama-app-${{ matrix.target }}
          path: app/src-tauri/target/${{ matrix.target }}/release/bundle/macos/Claw Sama.app

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          name: claw-sama-windows
          path: artifacts/raw/windows
      - uses: actions/download-artifact@v7
        with:
          name: claw-sama-app-aarch64-apple-darwin
          path: artifacts/raw/macos-app-arm64
      - uses: actions/download-artifact@v7
        with:
          name: claw-sama-app-x86_64-apple-darwin
          path: artifacts/raw/macos-app-x64

      - name: Repackage artifacts for release
        run: |
          mkdir -p artifacts/node_modules/@luckybugqqq/claw-sama-win32-x64
          mkdir -p artifacts/node_modules/@luckybugqqq/claw-sama-darwin-arm64
          mkdir -p artifacts/node_modules/@luckybugqqq/claw-sama-darwin-x64

          cp -R artifacts/raw/windows/. artifacts/node_modules/@luckybugqqq/claw-sama-win32-x64/
          cp -R artifacts/raw/macos-app-arm64/. artifacts/node_modules/@luckybugqqq/claw-sama-darwin-arm64/
          cp -R artifacts/raw/macos-app-x64/. artifacts/node_modules/@luckybugqqq/claw-sama-darwin-x64/

          cp -R src artifacts/node_modules/@luckybugqqq/claw-sama-win32-x64/
          cp -R src artifacts/node_modules/@luckybugqqq/claw-sama-darwin-arm64/
          cp -R src artifacts/node_modules/@luckybugqqq/claw-sama-darwin-x64/

          cp index.ts openclaw.plugin.json package.json LICENSE README.md artifacts/node_modules/@luckybugqqq/claw-sama-win32-x64/
          cp index.ts openclaw.plugin.json package.json LICENSE README.md artifacts/node_modules/@luckybugqqq/claw-sama-darwin-arm64/
          cp index.ts openclaw.plugin.json package.json LICENSE README.md artifacts/node_modules/@luckybugqqq/claw-sama-darwin-x64/

      - name: List artifacts
        run: find artifacts -type f 2>/dev/null || ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/node_modules/**
          generate_release_notes: true